<nav class="navbar navbar-dark bg-dark">
  <a href="/" class="navbar-brand">CLIENTES</a>
</nav>

<div class="row mt-5">
  <div class="card">
    <div class="card-body">
      <form action="">
        <div class="form-group">
          <input type="text" readonly="readonly" [(ngModel)]="user.num_clie" name="num_clie" class="form-control" required hidden>
        </div>
        <div class="form-group"><label class="control-label">ID Empresa</label><input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Sucursal</label><input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control"></div>
        <div class="form-group">
          <label class="control-label">Nombre Cliente</label>
          <input type="text" [(ngModel)]="user.nombre" name="nombre" placeholder="DIGITE EL NOMBRE" class="form-control" autofocus>
        </div>
        <div class="form-group"><label class="control-label">Identidad</label><input type="text" [(ngModel)]="user.identidad" name="identidad" class="form-control"></div>
        <div class="form-group"><label class="control-label">RTN</label><input type="text" [(ngModel)]="user.rtn" name="rtn" class="form-control"></div>
        <div class="form-group"><label class="control-label">Telefono</label><input type="text" [(ngModel)]="user.telefono" name="telefono" class="form-control"></div>
        <div class="form-group"><label class="control-label">Direccion</label><input type="text" [(ngModel)]="user.direccion" name="direccion" class="form-control"></div>
        <div class="form-group"><label class="control-label">Correo</label><input type="text" [(ngModel)]="user.correo" name="correo" class="form-control"></div>
        <div class="form-group"><label class="control-label">Fecha Nacimiento</label><input type="date" [(ngModel)]="user.fecha_nac" name="fecha_nac" class="form-control"></div>
        <div class="form-group"><label class="control-label">Fecha Creacion</label><input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" class="form-control"></div>
        <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">Actualizar</button>
      </form>
    </div>
  </div>
</div>
