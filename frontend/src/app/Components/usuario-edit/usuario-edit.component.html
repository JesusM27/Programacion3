<nav class="navbar navbar-dark bg-dark">
  <a href="/" class="navbar-brand">USUARIOS</a>
</nav>

<div class="row mt-5">
  <div class="card">
    <div class="card-body">
      <form action="">
        <div class="form-group">
          <input type="text" readonly="readonly" [(ngModel)]="user.userid" name="userid" class="form-control" required hidden>
        </div>
        <div class="form-group"><label class="control-label">ID Empresa</label><input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Sucursal</label><input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Tipo Usuario</label><input type="number" [(ngModel)]="user.idtpusuario" name="idtpusuario" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Empleado</label><input type="number" [(ngModel)]="user.idemp" name="idemp" class="form-control"></div>
        <div class="form-group">
          <label class="control-label">Usuario</label>
          <input type="text" [(ngModel)]="user.usuario" name="usuario" placeholder="DIGITE EL USUARIO" class="form-control" autofocus>
        </div>
        <div class="form-group">
          <label class="control-label">Clave</label>
          <input type="password" [(ngModel)]="user.clave" name="clave" class="form-control">
        </div>
        <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">Actualizar</button>
      </form>
    </div>
  </div>
</div>
