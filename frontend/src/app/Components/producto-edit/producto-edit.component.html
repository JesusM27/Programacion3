<nav class="navbar navbar-dark bg-dark">
  <a href="/" class="navbar-brand">PRODUCTOS</a>
</nav>

<div class="row mt-5">
  <div class="card">
    <div class="card-body">
      <form action="">
        <div class="form-group">
          <input type="text" readonly="readonly" [(ngModel)]="user.num_prod" name="num_prod" class="form-control" required hidden>
        </div>
        <div class="form-group"><label class="control-label">ID Empresa</label><input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Sucursal</label><input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Tipo Producto</label><input type="number" [(ngModel)]="user.idtpprod" name="idtpprod" class="form-control"></div>
        <div class="form-group">
          <label class="control-label">Descripcion</label>
          <input type="text" [(ngModel)]="user.descripcion" name="descripcion" placeholder="DESCRIPCION" class="form-control" autofocus>
        </div>
        <div class="form-group"><label class="control-label">Presentacion</label><input type="text" [(ngModel)]="user.presentacion" name="presentacion" class="form-control"></div>
        <div class="form-group"><label class="control-label">Marca</label><input type="text" [(ngModel)]="user.marca" name="marca" class="form-control"></div>
        <div class="form-group"><label class="control-label">Valor</label><input type="number" [(ngModel)]="user.valor" name="valor" class="form-control"></div>
        <div class="form-group"><label class="control-label">Precio Venta</label><input type="number" [(ngModel)]="user.precioventa" name="precioventa" class="form-control"></div>
        <div class="form-group"><label class="control-label">Existencia</label><input type="number" [(ngModel)]="user.existencia" name="existencia" class="form-control"></div>
        <div class="form-group"><label class="control-label">Fecha Ingreso</label><input type="date" [(ngModel)]="user.fecha_ingreso" name="fecha_ingreso" class="form-control"></div>
        <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">Actualizar</button>
      </form>
    </div>
  </div>
</div>
