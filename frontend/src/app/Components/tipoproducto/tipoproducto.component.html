<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE TIPO PRODUCTO</a>
</nav>

<div class="agregar_contenedor">
<div class="row mt-5">
<div class="card">
    <div class="card-body">
        <form id="formulario" name="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate >
          <div class="form-group">
            <label for="" class="control-label" hidden>Registro No.</label>
                  <input type="text"  readonly="readonly"  [(ngModel)]="user.idtpprod" name="idtpprod" placeholder="No" class="form-control" required hidden>
                  </div>                  

              <div class="form-group">
                  <label for="" class="control-label">ID Empresa</label>
                  <input type="number"  [(ngModel)]="user.idempresa"  name="idempresa" placeholder="ID EMPRESA"  class="form-control" autofocus>
              </div>

              <div class="form-group">
                <label for="" class="control-label">Tipo Producto</label>
                <input type="text"  [(ngModel)]="user.tipo"  name="tipo" placeholder="TIPO PRODUCTO"  class="form-control" autofocus>
                <div ng-show="!user.tipo && formulario.$submitted" class="alert alert-warning">Digite el Tipo</div>
              </div>

              <div class="form-group">
    <label for="" class="control-label">Empresa</label>
    <select class="form-control" [(ngModel)]="$any(user).idempresa" name="idempresa" autofocus>
        <option *ngFor="let lista of Empresalist" [value]="lista.idempresa">
            {{lista.nombre}}
        </option>
    </select>
</div>

          <button type="submit" class="btn btn-primary" formnovalidate value="Save"  onclick="javascript:alert('Registro Almacenado')">
              Agregar
          </button>
        </form>
    </div>
</div>
</div>
<br>
<div class="container">  
    <div class="row mt-25">          
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>ID EMPRESA</th>
                    <th>TIPO</th>
                    <th>ESTADO</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idtpprod}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.tipo}}</td>
                    <td>{{User.estado}}</td>
                    <td> <button class="btn btn-danger" (click)="EliminarData(User.idtpprod)" onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
<td>
    <button class="btn btn-success" [routerLink]="['/tipoproducto/edit', User.idtpprod]">
        Actualizar
    </button>
</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
