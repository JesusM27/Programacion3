<nav class="navbar navbar-dark bg-dark">
  <a href="/" class="navbar-brand">AREAS DE TRABAJO</a>
</nav>

<div class="row mt-5">
  <div class="card">
    <div class="card-body">
      <form action="">
        <div class="form-group">
          <input type="text" readonly="readonly" [(ngModel)]="user.idarea" name="idarea" class="form-control" required hidden>
        </div>
        <div class="form-group">
          <label class="control-label">ID Empresa</label>
          <input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control">
        </div>
        <div class="form-group">
          <label class="control-label">ID Sucursal</label>
          <input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control">
        </div>
        <div class="form-group">
          <label class="control-label">Area</label>
          <input type="text" [(ngModel)]="user.area" name="area" placeholder="DIGITE EL AREA" class="form-control" autofocus>
        </div>
        <div class="form-group">
          <label class="control-label">Fecha Creacion</label>
          <input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" class="form-control">
        </div>
        <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">
          Actualizar
        </button>
      </form>
    </div>
  </div>
</div>
