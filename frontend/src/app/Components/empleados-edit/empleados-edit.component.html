<nav class="navbar navbar-dark bg-dark">
  <a href="/" class="navbar-brand">EMPLEADOS</a>
</nav>

<div class="row mt-5">
  <div class="card">
    <div class="card-body">
      <form action="">
        <div class="form-group">
          <input type="text" readonly="readonly" [(ngModel)]="user.idemp" name="idemp" class="form-control" required hidden>
        </div>
        <div class="form-group"><label class="control-label">ID Empresa</label><input type="number" [(ngModel)]="user.idempresa" name="idempresa" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Sucursal</label><input type="number" [(ngModel)]="user.idsuc" name="idsuc" class="form-control"></div>
        <div class="form-group"><label class="control-label">ID Area</label><input type="number" [(ngModel)]="user.idarea" name="idarea" class="form-control"></div>
        <div class="form-group">
          <label class="control-label">Identidad</label>
          <input type="text" [(ngModel)]="user.identidad" name="identidad" placeholder="DIGITE LA IDENTIDAD" class="form-control" autofocus>
        </div>
        <div class="form-group"><label class="control-label">Nombres</label><input type="text" [(ngModel)]="user.nombres" name="nombres" class="form-control"></div>
        <div class="form-group"><label class="control-label">Apellidos</label><input type="text" [(ngModel)]="user.apellidos" name="apellidos" class="form-control"></div>
        <div class="form-group"><label class="control-label">Fecha Nacimiento</label><input type="date" [(ngModel)]="user.fecha_nac" name="fecha_nac" class="form-control"></div>
        <div class="form-group"><label class="control-label">Sexo (M/F)</label><input type="text" [(ngModel)]="user.sexo" name="sexo" class="form-control"></div>
        <div class="form-group"><label class="control-label">Estado Civil</label><input type="text" [(ngModel)]="user.estado_civil" name="estado_civil" class="form-control"></div>
        <div class="form-group"><label class="control-label">Direccion</label><input type="text" [(ngModel)]="user.direccion" name="direccion" class="form-control"></div>
        <div class="form-group"><label class="control-label">Fecha Creacion</label><input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" class="form-control"></div>
        <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">Actualizar</button>
      </form>
    </div>
  </div>
</div>
