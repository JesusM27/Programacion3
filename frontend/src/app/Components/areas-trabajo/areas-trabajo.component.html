<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE AREAS DE TRABAJO</a>
</nav>

<div class="agregar_contenedor">
<div class="row mt-5">
<div class="card">
    <div class="card-body">
        <form id="formulario" name="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate >
          <div class="form-group">
            <label for="" class="control-label" hidden>Registro No.</label>
                  <input type="text"  readonly="readonly"  [(ngModel)]="user.idarea" name="idarea" placeholder="No" class="form-control" required hidden>
                  </div>                  

              <div class="form-group">
                  <label for="" class="control-label">ID Empresa</label>
                  <input type="number"  [(ngModel)]="user.idempresa"  name="idempresa" placeholder="ID EMPRESA"  class="form-control" autofocus>
              </div>
              <div class="form-group">
                <label for="" class="control-label">ID Sucursal</label>
                <input type="number"  [(ngModel)]="user.idsuc"  name="idsuc" placeholder="ID SUCURSAL"  class="form-control" autofocus>
              </div>

              <div class="form-group">
                <label for="" class="control-label">Area</label>
                <input type="text"  [(ngModel)]="user.area"  name="area" placeholder="DIGITE EL AREA"  class="form-control" autofocus>
                <div ng-show="!user.area && formulario.$submitted" class="alert alert-warning">Digite el Area</div>
              </div>
              
              <div class="form-group">
                <label for="" class="control-label">Fecha Creacion</label>
                <input type="date"  [(ngModel)]="user.fecha_creacion"  name="fecha_creacion" class="form-control">
            </div>

                    <div class="form-group">
                        <option>Seleccione la Empresa</option>
                          <select class="form-control" size="1" [(ngModel)]="user.idempresa" name="idempresa" required>
                                 <option *ngFor="let lista of Empresalist" value={{lista.idempresa}}>{{lista.nombre}}</option>
                        </select>
                      </div>

                      <div class="form-group">
  <label>Sucursal:</label>
  <select class="form-control" [(ngModel)]="user.idsuc" name="idsuc" required>
    <option [value]="null" disabled>Seleccione la Sucursal</option>
    <option *ngFor="let s of Sucursallist" [value]="s.idsuc">
      {{s.sucursal}}
    </option>
  </select>
</div>

          <button type="submit" class="btn btn-primary" formnovalidate value="Save"  onclick="javascript:alert('Registro Almacenado')">
              Agregar
          </button>
        </form>
    </div>
</div>
</div>
<br>
<div class="container">  
    <div class="row mt-25">          
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>ID EMPRESA</th>
                    <th>ID SUCURSAL</th>
                    <th>AREA</th>
                    <th>FECHA CREACION</th>
                    <th>ESTADO</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idarea}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.idsuc}}</td>
                    <td>{{User.area}}</td>
                    <td>{{User.fecha_creacion}}</td>
                    <td>{{User.estado}}</td>
                   <td> <button class="btn btn-danger" (click)="EliminarData(User.idarea)" onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
<td>
    <button class="btn btn-success" [routerLink]="['/areas_trabajo/edit', User.idarea]">
        Actualizar
    </button>
</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
