<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE PROVEEDORES</a>
</nav>

<div class="container">  
    <div class="row mt-25">          
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>ID EMPRESA</th>
                    <th>PROVEEDOR</th>
                    <th>DIRECCION</th>
                    <th>TELEFONO</th>
                    <th>RESPONSABLE</th>
                    <th>FECHA CREACION</th>
                    <th>OBSERVACIONES</th>
                    <th>ESTADO</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idprov}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.proveedor}}</td>
                    <td>{{User.direccion}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.responsable}}</td>
                    <td>{{User.fecha_creacion}}</td>
                    <td>{{User.observaciones}}</td>
                    <td>{{User.estado}}</td>
                    <td><button class="btn btn-danger">Eliminar</button></td>
                    <td><button class="btn btn-success">Actualizar</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
