<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE FORMA DE PAGO</a>
</nav>

<div class="agregar_contenedor">
<div class="row mt-5">
<div class="card">
    <div class="card-body">
        <form id="formulario" name="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate >
          <div class="form-group">
            <label for="" class="control-label" hidden>Registro No.</label>
                  <input type="text"  readonly="readonly"  [(ngModel)]="user.idfpago" name="idfpago" placeholder="No" class="form-control" required hidden>
                  </div>                  

              <div class="form-group">
                  <label for="" class="control-label">ID Empresa</label>
                  <input type="number"  [(ngModel)]="user.idempresa"  name="idempresa" placeholder="ID EMPRESA"  class="form-control" autofocus>
              </div>

              <div class="form-group">
                <label for="" class="control-label">Forma de Pago</label>
                <input type="text"  [(ngModel)]="user.formapago"  name="formapago" placeholder="FORMA PAGO"  class="form-control" autofocus>
                <div ng-show="!user.formapago && formulario.$submitted" class="alert alert-warning">Digite Forma Pago</div>
              </div>

              <div class="form-group">
                        <label for="" class="control-label">Empresa</label>
                        <select class="form-control" [(ngModel)]="$any(user).idempresa" name="idempresa" autofocus>
                            <option *ngFor="let lista of Empresalist" [value]="lista.idempresa">
                                {{lista.nombre}}
                            </option>
                        </select>
                    </div>



          <button type="submit" class="btn btn-primary" formnovalidate value="Save"  onclick="javascript:alert('Registro Almacenado')">
              Agregar
          </button>
        </form>
    </div>
</div>
</div>
<br>
<div class="container">  
    <div class="row mt-25">          
        <table class="table table-borbered table-hover">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>ID EMPRESA</th>
                    <th>FORMA DE PAGO</th>
                    <th>ESTADO</th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idfpago}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.formapago}}</td>
                    <td>{{User.estado}}</td>
                    <td> <button class="btn btn-danger" (click)="EliminarData(User.idfpago)" onclick="javascript:alert('Registro Eliminado')">Eliminar</button> </td>
<td>
    <button class="btn btn-success" [routerLink]="['/formapago/edit', User.idfpago]">
        Actualizar
    </button>
</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
